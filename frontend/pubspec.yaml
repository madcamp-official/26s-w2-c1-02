name: rehearsal
description: "Rehearsal.io — LLM 기반 프레젠테이션 질의응답 생성/분석 서비스"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Routing (web URL-aware, deep-linkable)
  go_router: ^14.6.2

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.2.2

  # File picking (PDF upload) — supports web/android/ios
  file_picker: ^8.1.6
  record: ^6.2.1
  just_audio: ^0.10.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# 앱 아이콘 생성 설정 — 원본 1장에서 Android/iOS/Web 아이콘 전부 생성.
# 실행: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icons/malggori-app-icon.png"
  android: true
  ios: true
  remove_alpha_ios: true # App Store 규격 — 알파 채널 제거
  web:
    generate: true
    image_path: "assets/icons/malggori-app-icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700

    - family: NanumSquareRound
      fonts:
        - asset: assets/fonts/NanumSquareRoundOTFR.otf
          weight: 400
        - asset: assets/fonts/NanumSquareRoundOTFB.otf
          weight: 400
        - asset: assets/fonts/NanumSquareRoundOTFEB.otf
          weight: 400
