<svg xmlns="http://www.w3.org/2000/svg" width="862" height="922" viewBox="-1 -10 862 934"><text x="0" y="28" font-family="Inter" font-size="26" font-weight="800" fill="#191F28" text-anchor="start">10 공통 (권한·오류)</text><g transform="translate(0,76)"><text x="0" y="-14" font-family="Inter" font-size="14" font-weight="600" fill="#6B7684" text-anchor="start">마이크 권한</text><rect x="0" y="0" width="390" height="844" rx="20" fill="#FFFFFF" stroke="#D6DBE0" stroke-width="1.5"/><g><text x="24" y="60" font-family="Inter" font-size="13" font-weight="600" fill="#B0B8C1" text-anchor="start">① 권한 요청 (브라우저/OS)</text><rect x="32" y="90" width="326" height="168" rx="20" fill="#FFFFFF"/><text x="195.0" y="134" font-family="Inter" font-size="18" font-weight="700" fill="#191F28" text-anchor="middle">마이크 사용 허용</text><text x="195.0" y="162" font-family="Inter" font-size="13.5" font-weight="400" fill="#6B7684" text-anchor="middle">rehearsal.io이(가) 마이크를</text><text x="195.0" y="182" font-family="Inter" font-size="13.5" font-weight="400" fill="#6B7684" text-anchor="middle">사용하려고 합니다.</text><rect x="52" y="190" width="138.0" height="48" rx="10" fill="#F2F4F6"/><text x="121.0" y="219.4" font-family="Inter" font-size="15" font-weight="600" fill="#4E5968" text-anchor="middle">거부</text><rect x="200.0" y="190" width="138.0" height="48" rx="10" fill="#FFAA00"/><text x="269.0" y="219.4" font-family="Inter" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">허용</text><text x="24" y="320" font-family="Inter" font-size="13" font-weight="600" fill="#B0B8C1" text-anchor="start">② 거부 시 안내 화면</text><rect x="24" y="340" width="342" height="168" rx="16" fill="#FFECEE"/><rect x="191.0" y="377" width="8" height="13" rx="4" fill="none" stroke="#F04452" stroke-width="1.8"/><path d="M187.0 386 a8 8 0 0 0 16 0 M195.0 394 V399 M190.0 399 H200.0" stroke="#F04452" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="195.0" y="428" font-family="Inter" font-size="16" font-weight="700" fill="#191F28" text-anchor="middle">마이크 권한이 필요해요</text><text x="195.0" y="452.0" font-family="Inter" font-size="12.5" font-weight="400" fill="#6B7684" text-anchor="middle">발표 녹음과 답변을 위해 마이크를 사용해요.</text><rect x="115.0" y="466" width="160" height="34" rx="10" fill="#FFF4DC"/><text x="195.0" y="487.5" font-family="Inter" font-size="12.5" font-weight="700" fill="#D18700" text-anchor="middle">설정에서 허용하기</text><text x="24" y="560" font-family="Inter" font-size="12" font-weight="400" fill="#6B7684" text-anchor="start">지원 브라우저: Chrome · Safari · Edge 최신 버전</text></g></g><g transform="translate(470,76)"><text x="0" y="-14" font-family="Inter" font-size="14" font-weight="600" fill="#6B7684" text-anchor="start">오류 · 이탈 처리</text><rect x="0" y="0" width="390" height="844" rx="20" fill="#FFFFFF" stroke="#D6DBE0" stroke-width="1.5"/><g><text x="24" y="60" font-family="Inter" font-size="13" font-weight="600" fill="#B0B8C1" text-anchor="start">① API 오류 (STT/TTS/질문 생성)</text><rect x="24" y="80" width="342" height="150" rx="16" fill="#FFFFFF" stroke="#E5E8EB" stroke-width="1.2"/><circle cx="195.0" cy="116" r="14" fill="#FFECEE"/><text x="195.0" y="121" font-family="Inter" font-size="16" font-weight="700" fill="#F04452" text-anchor="middle">!</text><text x="195.0" y="152" font-family="Inter" font-size="15.5" font-weight="700" fill="#191F28" text-anchor="middle">질문 생성에 실패했어요</text><text x="195.0" y="174" font-family="Inter" font-size="12.5" font-weight="400" fill="#6B7684" text-anchor="middle">네트워크 확인 후 다시 시도해주세요.</text><rect x="44" y="190" width="146.0" height="34" rx="10" fill="#F2F4F6"/><text x="117.0" y="211.68" font-family="Inter" font-size="13" font-weight="600" fill="#4E5968" text-anchor="middle">닫기</text><rect x="200.0" y="190" width="146.0" height="34" rx="10" fill="#FFAA00"/><text x="273.0" y="211.68" font-family="Inter" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">다시 시도</text><text x="24" y="280" font-family="Inter" font-size="13" font-weight="600" fill="#B0B8C1" text-anchor="start">② 진행 중 이탈 경고</text><rect x="24" y="300" width="342" height="150" rx="16" fill="#FFFFFF" stroke="#E5E8EB" stroke-width="1.2"/><text x="195.0" y="340" font-family="Inter" font-size="15.5" font-weight="700" fill="#191F28" text-anchor="middle">지금 나가시겠어요?</text><text x="195.0" y="362.0" font-family="Inter" font-size="12.5" font-weight="400" fill="#6B7684" text-anchor="middle">진행 중인 발표는 임시 저장되고,</text><text x="195.0" y="381.5" font-family="Inter" font-size="12.5" font-weight="400" fill="#6B7684" text-anchor="middle">다시 들어오면 이어서 할 수 있어요.</text><rect x="44" y="410" width="146.0" height="34" rx="10" fill="#F2F4F6"/><text x="117.0" y="431.68" font-family="Inter" font-size="13" font-weight="600" fill="#4E5968" text-anchor="middle">나가기</text><rect x="200.0" y="410" width="146.0" height="34" rx="10" fill="#FFAA00"/><text x="273.0" y="431.68" font-family="Inter" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">계속하기</text></g></g></svg>