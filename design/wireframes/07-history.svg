xt><rect x="112" y="380" width="56" height="26" rx="13" fill="#F2F4F6"/><text x="140.0" y="397" font-family="Inter" font-size="12" font-weight="600" fill="#6B7684" text-anchor="middle">패스함</text><text x="24" y="422" font-family="Inter" font-size="14" font-weight="400" fill="#191F28" text-anchor="start">경쟁 서비스 대비 차별점이 뭔가요?</text><rect x="24" y="456" width="104" height="26" rx="13" fill="#FFF4DC"/><text x="76.0" y="473" font-family="Inter" font-size="12" font-weight="600" fill="#D18700" text-anchor="middle">꼬리 Q2-1</text><text x="24" y="498" font-family="Inter" font-size="14" font-weight="400" fill="#191F28" text-anchor="start">표준편차는 확인했어요?</text><rect x="40" y="514" width="326" height="40" rx="16" fill="#F2F4F6"/><text x="56" y="538.0" font-family="Inter" font-size="12.5" font-weight="400" fill="#6B7684" text-anchor="start">내 답변: 확인하지 못했습니다…</text></g></g><g transform="translate(940,76)"><text x="0" y="-14" font-family="Inter" font-size="14" font-weight="600" fill="#6B7684" text-anchor="start">발표 삭제 확인</text><rect x="0" y="0" width="390" height="844" rx="20" fill="#FFFFFF" stroke="#D6DBE0" stroke-width="1.5"/><g><path d="M34 24 L26 30 L34 36" stroke="#191F28" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="195.0" y="35" font-family="Inter" font-size="17" font-weight="600" fill="#191F28" text-anchor="middle">1차 발표</text><path d="M353 24 H367 M357.5 24 V21 H362.5 V24 M355 24 L356 39 H364 L365 24" stroke="#6B7684" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="0" y="0" width="390" height="844" rx="0" fill="#191F28" fill-opacity="0.45"/><rect x="32" y="310" width="326" height="190" rx="20" fill="#FFFFFF"/><text x="195.0" y="354" font-family="Inter" font-size="18" font-weight="700" fill="#191F28" text-anchor="middle">발표를 삭제할까요?</text><text x="195.0" y="382" font-family="Inter" font-size="13.5" font-weight="400" fill="#6B7684" text-anchor="middle">녹음, 스크립트, Q&amp;A 로그가</text><text x="195.0" y=