#E5E8EB" stroke-width="1"/><text x="24" y="248" font-family="Inter" font-size="12" font-weight="600" fill="#D18700" text-anchor="start">00:12</text><text x="24" y="270" font-family="Inter" font-size="14" font-weight="400" fill="#191F28" text-anchor="start">안녕하세요, 오늘 발표를 맡은 박준서입니다.</text><text x="24" y="291" font-family="Inter" font-size="14" font-weight="400" fill="#191F28" text-anchor="start">저희 프로젝트는 발표 리허설을 돕는…</text><text x="24" y="336" font-family="Inter" font-size="12" font-weight="600" fill="#D18700" text-anchor="start">01:40</text><text x="24" y="358" font-family="Inter" font-size="14" font-weight="400" fill="#191F28" text-anchor="start">핵심 기능은 세 가지입니다. 첫째, AI가</text><text x="24" y="379" font-family="Inter" font-size="14" font-weight="400" fill="#191F28" text-anchor="start">발표 자료를 분석해 예상 질문을 만들고…</text><text x="24" y="424" font-family="Inter" font-size="12" font-weight="600" fill="#D18700" text-anchor="start">04:12</text><text x="24" y="446" font-family="Inter" font-size="14" font-weight="400" fill="#191F28" text-anchor="start">성능은 기존 대비 2배 개선되었습니다.</text><text x="24" y="467" font-family="Inter" font-size="14" font-weight="400" fill="#191F28" text-anchor="start">측정에는 사내 서버를 사용했고…</text></g></g><g transform="translate(470,76)"><text x="0" y="-14" font-family="Inter" font-size="14" font-weight="600" fill="#6B7684" text-anchor="start">발표 상세 · Q&amp;A 탭</text><rect x="0" y="0" width="390" height="844" rx="20" fill="#FFFFFF" stroke="#D6DBE0" stroke-width="1.5"/><g><path d="M34 24 L26 30 L34 36" stroke="#191F28" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="195.0" y="35" font-family="Inter" font-size="17" font-weight="600" fill="#191F28" text-anchor="middle">1차 발표</text><path d="M353 24 H367 M357.5 24 V21 H362.5 V24 M355 24 L356 39 H364 L365 24" stroke="#6B7684" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="24" y="92" font-family="Inter" font-size="13" font-weight="400" fill="#6B76